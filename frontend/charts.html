<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opportunity Radar | Analytics</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="scanline"></div>
    <div class="grid-bg"></div>
    <header id="app-header">
        <div class="header-left">
            <div class="logo">
                <div class="logo-pulse"></div><span class="logo-icon">📡</span>
                <h1>Opportunity Radar</h1><span class="version-badge">v1.0</span>
            </div>
        </div>
        <nav id="main-nav">
            <a href="index.html" class="nav-link"><span class="nav-icon">⚡</span> Signals</a>
            <a href="charts.html" class="nav-link active"><span class="nav-icon">📊</span> Analytics</a>
            <a href="impact.html" class="nav-link"><span class="nav-icon">🎯</span> Impact Model</a>
        </nav>
    </header>
    <main id="dashboard" style="padding:2rem;">
        <h2 style="margin-bottom:1.5rem;font-size:1.3rem;">📊 Market Analytics Dashboard</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;">
            <div class="glass-card">
                <div class="card-header">
                    <h3>Conviction Distribution</h3>
                </div><canvas id="convictionChart"></canvas>
            </div>
            <div class="glass-card">
                <div class="card-header">
                    <h3>Signal Direction Split</h3>
                </div><canvas id="directionChart"></canvas>
            </div>
            <div class="glass-card">
                <div class="card-header">
                    <h3>Sector Exposure</h3>
                </div><canvas id="sectorChart"></canvas>
            </div>
            <div class="glass-card">
                <div class="card-header">
                    <h3>Agent Trigger Frequency</h3>
                </div><canvas id="agentChart"></canvas>
            </div>
        </div>
    </main>
    <footer id="app-footer">
        <p>Opportunity Radar v1.0 — Analytics powered by Chart.js</p>
    </footer>
    <script>
        Chart.defaults.color = '#8892a8';
        Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';
        const glow = (r, g, b) => [`rgba(${r},${g},${b},0.8)`, `rgba(${r},${g},${b},0.1)`];
        new Chart(document.getElementById('convictionChart'), { type: 'bar', data: { labels: ['HIGH', 'MEDIUM', 'LOW'], datasets: [{ label: 'Opportunities', data: [14, 22, 8], backgroundColor: ['rgba(79,140,255,0.7)', 'rgba(108,92,231,0.7)', 'rgba(90,100,120,0.5)'], borderRadius: 6, borderSkipped: false }] }, options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.03)' } } } } });
        new Chart(document.getElementById('directionChart'), { type: 'doughnut', data: { labels: ['BULLISH', 'BEARISH', 'NEUTRAL'], datasets: [{ data: [58, 24, 18], backgroundColor: ['rgba(0,214,143,0.8)', 'rgba(255,92,92,0.8)', 'rgba(90,100,120,0.6)'], borderColor: '#0f1219', borderWidth: 3 }] }, options: { cutout: '65%' } });
        new Chart(document.getElementById('sectorChart'), { type: 'bar', data: { labels: ['Banking', 'IT Services', 'FMCG', 'Oil & Gas', 'Pharma', 'Auto', 'Infra', 'NBFC'], datasets: [{ label: 'Signals', data: [18, 15, 9, 12, 7, 8, 6, 11], backgroundColor: 'rgba(79,140,255,0.5)', borderColor: 'rgba(79,140,255,0.8)', borderWidth: 1, borderRadius: 4 }] }, options: { indexAxis: 'y', plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.03)' } } } } });
        new Chart(document.getElementById('agentChart'), { type: 'radar', data: { labels: ['Ingestion', 'Filing', 'Technical', 'Sentiment', 'Scoring', 'Synthesis'], datasets: [{ label: 'Trigger Rate %', data: [100, 72, 95, 58, 100, 100], backgroundColor: 'rgba(79,140,255,0.15)', borderColor: 'rgba(79,140,255,0.8)', pointBackgroundColor: '#4f8cff' }] }, options: { scales: { r: { beginAtZero: true, max: 100, grid: { color: 'rgba(255,255,255,0.05)' }, angleLines: { color: 'rgba(255,255,255,0.05)' } } } } });
    </script>
</body>

</html>
