<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Opportunity Radar | Analytics</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .chart-container {
            background: var(--panel-bg);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
    </style>
</head>

<body class="dark-theme">
    <header class="app-header">
        <div class="logo">
            <span class="logo-icon">📡</span>
            <h1>Opportunity Radar</h1>
        </div>
        <nav class="main-nav">
            <a href="index.html">Signals</a>
            <a href="charts.html" class="active">Analytics</a>
            <a href="impact.html">Impact Model</a>
        </nav>
    </header>
    <main class="dashboard">
        <h2>Data Visualizations</h2>
        <div class="grid-2">
            <div class="chart-container">
                <canvas id="convictionChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="directionChart"></canvas>
            </div>
        </div>
    </main>
    <script>
        // Mock chart setup for demo
        Chart.defaults.color = '#94a3b8';
        new Chart(document.getElementById('convictionChart'), {
            type: 'bar',
            data: { labels: ['HIGH', 'MEDIUM', 'LOW'], datasets: [{ label: 'Conviction Levels', data: [12, 19, 3], backgroundColor: '#3b82f6' }] }
        });
        new Chart(document.getElementById('directionChart'), {
            type: 'doughnut',
            data: { labels: ['BULLISH', 'BEARISH', 'NEUTRAL'], datasets: [{ data: [15, 8, 4], backgroundColor: ['#10b981', '#ef4444', '#94a3b8'], borderColor: '#15181e' }] }
        });
    </script>
</body>

</html>
